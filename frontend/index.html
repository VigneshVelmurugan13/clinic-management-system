<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clinic Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Clinic Management</h1>

    <!-- LOGIN -->
    <div id="loginSection" class="card p-4 mb-4">
        <h4>Login</h4>
        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button type="button" class="btn btn-primary" onclick="login()">Login</button>
    </div>

    <!-- MAIN APP -->
    <div id="appSection" style="display:none;">

        <button class="btn btn-danger mb-3" onclick="logout()">Logout</button>

        <!-- PATIENT -->
        <div class="card p-3 mb-3">
            <h4>Add Patient</h4>
            <input id="pname" class="form-control mb-2" placeholder="Name">
            <input id="page" type="number" class="form-control mb-2" placeholder="Age">
            <input id="pdisease" class="form-control mb-2" placeholder="Disease">
            <button type="button" class="btn btn-success" onclick="addPatient()">Add</button>
            <div id="patients" class="mt-3"></div>
        </div>

        <!-- DOCTOR -->
        <div class="card p-3 mb-3">
            <h4>Add Doctor</h4>
            <input id="dname" class="form-control mb-2" placeholder="Doctor Name">
            <input id="dspec" class="form-control mb-2" placeholder="Specialization">
            <button type="button" class="btn btn-success" onclick="addDoctor()">Add</button>
            <div id="doctors" class="mt-3"></div>
        </div>

        <!-- APPOINTMENT -->
        <div class="card p-3">
            <h4>Book Appointment</h4>
            <input id="patientId" class="form-control mb-2" placeholder="Patient ID">
            <input id="doctorId" class="form-control mb-2" placeholder="Doctor ID">
            <input id="date" type="date" class="form-control mb-2">

            <select id="priority" class="form-control mb-2">
                <option>Normal</option>
                <option>Emergency</option>
            </select>

            <button type="button" class="btn btn-primary" onclick="bookAppointment()">Book</button>

            <div id="appointments" class="mt-3"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
